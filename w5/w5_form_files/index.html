<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Salvatore Boone">
    <meta name="description" content="Default HTML Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
    <h1>Birthday Party Registration Form</h1>
    <form action="confirm.html" method="get">
        <table>
            <thead>
                <tr>
                    <td>Labels</td>
                    <td>Form Fields</td>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td><label for="gfirst">Parent/Guardian Name</label></td>
                    <td><input type="text" required name="gfirst" id="gfirst" maxlength="20" placeholder="First Name"><input type="text" required name="glast" id="glast" maxlength="20" placeholder="Last Name"></td>
                </tr>
                <tr>
                    <td><label for="cfirst">Child's First Name</label></td>
                    <td><input type="text" required name="cfirst" id="cfirst" placeholder="Child's FirstName"></td>
                </tr>
                <tr>
                    <td><label for="age">Child's Age</label></td>
                    <td><input type="number" required name="age" id="age" value="3"></td>
                </tr>

                <tr>
                    <td><label for="date">Date</label></td>
                    <td><input type="date" required name="date" id="date"></td>
                </tr>

                <tr>
                    <td><label for="time">Start Time</label></td>
                    <td><input type="time" required name="time" id="time"></td>
                </tr>

                <tr>
                    <td><label for="guests">Number of Guests</label></td>
                    <td><input type="number" required name="guest" value="5"></td>
                </tr>

                <tr>
                    <td><label for="size">Size</label></td>
                    <td>
                        <label for="sm">sm</label>
                        <input type="radio" name="size" id="sm">
                        <br>
                        <label for="md">md</label>
                        <input type="radio" name="size" id="md">
                        <br>
                        <label for="lg">lg</label>
                        <input type="radio" name="size"  id="lg">
                    </td>  
                </tr>

                <tr>
                    <td><label for="drinks">Drinks</label></td>
                    <td>
                        <input type="checkbox" name="drink1" id="drink1" checked value="coke"><label for="drink1">Coke</label><br>
                        <input type="checkbox" name="drink2" id="drink2" value="sprite"><label for="drink2">Sprite</label><br>
                        <input type="checkbox" name="drink3" id="drink3" value="fruit punch"><label for="drink3">Fruit Punch</label><br>
                        <input type="checkbox" name="drink4" id="drink4" value="lemonade"><label for="drink4">lemonade</label><br>
                        <input type="checkbox" name="drink5" id="drink5" value="iced tea"><label for="drink5">Iced Tea</label><br>
                    </td>
                </tr>

                <tr>
                    <td><label for="cake">Cake</label></td>
                    <td>
                        <select name="cake" id="cake"></select>
                        <option>Chocolate</option>
                        <option>Vanilla</option>
                        <option selected>I'll Bring My Own</option>
                    </td>
                    
                </tr>

                <tr>
                    <td><label for="colors"> Color Scheme</label></td>
                    <td><input type="color" name="colors" id="colors"></td>
                </tr>

                <tr>
                    <td><label for="comments">Additional Comments</label></td>
                    <td><textarea placeholder="Please add any additiona comments here" name="comments" id="comments"></textarea></td>
                </tr>
                <tr>
                    <td><input type="submit" value="Submit"></td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
